name: Run Counter Every 5 Minutes

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  call-api:
    runs-on: ubuntu-latest

    steps:
      - name: Call API
        run: |
          response=$(curl -s -X POST https://final-counter-three.vercel.app/api/counter)
          echo "Response: $response"